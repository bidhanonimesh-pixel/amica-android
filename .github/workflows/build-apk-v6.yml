name: Build Amica Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Checkout Amica source
        uses: actions/checkout@v4
        with:
          repository: semperai/amica
          path: amica-source
          ref: master

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android Build Tools
        run: |
          sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools"

      - name: Install dependencies
        working-directory: amica-source
        run: npm ci --legacy-peer-deps

      - name: Create env file
        working-directory: amica-source
        run: |
          cat > .env.local << 'EOF'
          NEXT_PUBLIC_APP_NAME=Amica
          NEXT_PUBLIC_CHATBOT_BACKEND=chatgpt
          NEXT_PUBLIC_OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          NEXT_PUBLIC_OPENAI_MODEL=gpt-4o-mini
          NEXT_PUBLIC_OPENAI_URL=https://api.openai.com/v1
          NEXT_PUBLIC_OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          NEXT_PUBLIC_ELEVENLABS_API_KEY=${{ secrets.ELEVENLABS_API_KEY }}
          NEXT_PUBLIC_ELEVENLABS_VOICE_ID=21m00Tcm4TlvDq8ikWAM
          NEXT_PUBLIC_TTS_BACKEND=elevenlabs
          NEXT_PUBLIC_STT_BACKEND=whisper_browser
          NEXT_PUBLIC_VISION_BACKEND=none
          NEXT_PUBLIC_ANIMATION_BACKEND=none
          NEXT_PUBLIC_VRM_URL=/vrm/AvatarSample_B.vrm
          NEXT_PUBLIC_BGM_ENABLED=false
          NEXT_PUBLIC_BACKGROUND_IMG_URL=/bg/bg-c.jpg
          NEXT_PUBLIC_NAME=Amica
          NEXT_PUBLIC_SYSTEM_PROMPT=You are Amica, a helpful friendly AI assistant with a 3D avatar.
          NEXT_PUBLIC_SUPABASE_URL=https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY=placeholder_key
          NEXT_PUBLIC_BASE_URL=http://localhost:3000
          EOF

      - name: Fix next.config.js
        working-directory: amica-source
        run: |
          cat > next.config.js << 'EOF'
          /** @type {import('next').NextConfig} */
          const nextConfig = {
            output: "export",
            trailingSlash: true,
            reactStrictMode: true,
            images: {
              unoptimized: true,
            },
            webpack: (config) => {
              config.resolve.fallback = { fs: false, net: false, tls: false };
              return config;
            },
          };
          module.exports = nextConfig;
          EOF

      - name: Remove server-side pages
        working-directory: amica-source
        run: |
          rm -rf src/pages/import 2>/dev/null || true
          rm -f src/pages/share.tsx 2>/dev/null || true
          rm -rf src/pages/api/ 2>/dev/null || true

      - name: Create stub API files
        working-directory: amica-source
        run: |
          mkdir -p src/pages/api

          cat > src/pages/api/amicaHandler.ts << 'EOF'
          import type { NextApiRequest, NextApiResponse } from 'next';
          export const sseClients: any[] = [];
          export default function handler(req: NextApiRequest, res: NextApiResponse) {
            res.status(200).json({ ok: true });
          }
          EOF

          cat > src/pages/api/dataHandler.ts << 'EOF'
          import type { NextApiRequest, NextApiResponse } from 'next';
          export default function handler(req: NextApiRequest, res: NextApiResponse) {
            res.status(200).json({ ok: true });
          }
          EOF

      - name: Replace apiHelper.ts with static-safe version
        working-directory: amica-source
        run: |
          cat > src/features/externalAPI/utils/apiHelper.ts << 'EOF'
          // Static build version - server-side fs removed

          export interface ApiResponse {
            sessionId?: string;
          }

          export const readFile = (filePath: string): any => {
            // Not available in static/mobile build
            console.warn('readFile not available in static build');
            return null;
          };

          export const writeFile = (filePath: string, data: any): void => {
            // Not available in static/mobile build
            console.warn('writeFile not available in static build');
          };

          export const sendToClients = (data: any): void => {
            // Not available in static/mobile build
          };

          export const getSessionData = (): any => {
            return {};
          };
          EOF
          echo "apiHelper.ts replaced!"

      - name: Build Next.js static export
        working-directory: amica-source
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Check build output
        working-directory: amica-source
        run: |
          ls out/
          echo "Build OK"

      - name: Install Capacitor
        working-directory: amica-source
        run: |
          npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest --legacy-peer-deps

      - name: Create Capacitor config
        working-directory: amica-source
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.amica.android",
            "appName": "Amica AI",
            "webDir": "out",
            "bundledWebRuntime": false,
            "android": {
              "allowMixedContent": true,
              "captureInput": true
            },
            "plugins": {
              "SplashScreen": {
                "launchShowDuration": 2000,
                "backgroundColor": "#1a1a2e"
              }
            },
            "server": {
              "androidScheme": "https",
              "cleartext": true
            }
          }
          EOF

      - name: Add Android platform
        working-directory: amica-source
        run: npx cap add android

      - name: Copy and sync
        working-directory: amica-source
        run: |
          npx cap copy android
          npx cap sync android

      - name: Patch build.gradle
        working-directory: amica-source/android
        run: |
          sed -i 's/compileSdkVersion .*/compileSdkVersion 34/' app/build.gradle
          sed -i 's/targetSdkVersion .*/targetSdkVersion 34/' app/build.gradle
          sed -i 's/minSdkVersion .*/minSdkVersion 26/' app/build.gradle
          sed -i 's/sourceCompatibility JavaVersion.VERSION_1_8/sourceCompatibility JavaVersion.VERSION_17/' app/build.gradle
          sed -i 's/targetCompatibility JavaVersion.VERSION_1_8/targetCompatibility JavaVersion.VERSION_17/' app/build.gradle

      - name: Patch AndroidManifest
        working-directory: amica-source/android/app/src/main
        run: |
          python3 << 'PYEOF'
          with open('AndroidManifest.xml', 'r') as f:
              content = f.read()
          permissions = """
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
          """
          if 'RECORD_AUDIO' not in content:
              content = content.replace('<application', permissions + '\n    <application', 1)
          if 'usesCleartextTraffic' not in content:
              content = content.replace('<application', '<application android:usesCleartextTraffic="true"', 1)
          with open('AndroidManifest.xml', 'w') as f:
              f.write(content)
          print("Patched!")
          PYEOF

      - name: Build Debug APK
        working-directory: amica-source/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Amica-AI-APK
          path: amica-source/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Amica AI v${{ github.run_number }}"
          body: |
            Amica AI Android APK
            Install: Settings > Security > Unknown Sources ON > APK install
          files: amica-source/android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
